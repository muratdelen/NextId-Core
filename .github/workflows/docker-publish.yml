name: Build and Publish NextId Core

on:
  push:
    branches:
      - main
      - nextid/main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: muratdelen/nextid-core
  NEXTID_BASE_VERSION: 26.6.3

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push NextId Core image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.NEXTID_BASE_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest