name: Build and Publish NextId-Core Image

on:
  push:
    branches:
      - main
      - nextid/main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: muratdelen/nextid-core
  NEXTID_CORE_VERSION: 26.6.3-nextid

jobs:
  build-and-push:
    name: Build and publish NextId-Core
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout NextId-Core
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Java
        uses: ./.github/actions/java-setup

      - name: Restore Maven cache
        uses: ./.github/actions/maven-cache

      - name: Set NextId-Core release version
        run: ./set-version.sh "${NEXTID_CORE_VERSION}"

      - name: Build NextId-Core distribution
        run: |
          ./mvnw install -Pdistribution -am \
            -pl distribution/maven-plugins/licenses-processor
          ./mvnw install dependency:resolve -V -e \
            -DskipTests \
            -DskipExamples \
            -DexcludeGroupIds=org.keycloak \
            -Dsilent=true \
            -DcommitProtoLockChanges=true

      - name: Prepare container build context
        id: prepare
        shell: bash
        run: |
          distribution="$(find quarkus/dist/target -maxdepth 1 -name 'keycloak-*.tar.gz' -print -quit)"
          test -n "$distribution"
          cp "$distribution" quarkus/container/
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish NextId-Core image
        uses: docker/build-push-action@v7
        with:
          context: quarkus/container
          file: quarkus/container/Dockerfile.nextid
          push: true
          build-args: |
            NEXTID_CORE_VERSION=${{ env.NEXTID_CORE_VERSION }}
            NEXTID_CORE_REVISION=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.NEXTID_CORE_VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prepare.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
